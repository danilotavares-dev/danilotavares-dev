name: Generate Snake Animation

on:
  schedule:
    # Runs at 12am UTC every day
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: Platane/snk@v3
        with:
          # github user name to read the contribution graph from
          github_user_name: ${{ github.repository_owner }}
          
          # Generates the SVGs for light and dark modes
          # We use a custom deep blue color palette to match your profile picture
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#94A2BD&color_dots=#1B212A,#374150,#515C6B,#6B768A,#94A2BD
            dist/github-contribution-grid-snake-dark.svg?color_snake=#C8D8E8&color_dots=#1B212A,#374150,#515C6B,#6B768A,#C8D8E8


      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
